[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ── Redirect www → apex ───────────────────────────────────────
[[redirects]]
  from = "https://www.vicwithgg-designer.netlify.app/*"
  to   = "https://vicwithgg-designer.netlify.app/:splat"
  status = 301
  force  = true

# ── Global security + perf headers ────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Cross-Origin-Opener-Policy = "same-origin"
    # Ajustar CSP según dominios de terceros que uses
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"

# ── Immutable cache para assets hasheados por Astro/Vite ──────
[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache estático para imágenes, fuentes, media ──────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML sin cache (contenido puede cambiar en cada deploy) ───
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── RSS / Sitemap ─────────────────────────────────────────────
[[headers]]
  for = "/rss.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Pagefind (search) assets — inmutables ─────────────────────
[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
